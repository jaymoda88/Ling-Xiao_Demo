<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="1200" height="420" font-family="'Noto Serif TC',serif">
  <defs>
    <radialGradient id="bg" cx="0.32" cy="0.28" r="0.9">
      <stop offset="0" stop-color="#1a0d15"/><stop offset="0.55" stop-color="#0d0805"/><stop offset="1" stop-color="#050408"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0d98f"/><stop offset="1" stop-color="#c9952a"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="420" fill="url(#bg)"/>
  <!-- 星點 -->
  <g fill="#c9952a" opacity="0.5">
    <circle cx="120" cy="70" r="1.6"/><circle cx="300" cy="50" r="1.2"/><circle cx="520" cy="90" r="1.4"/>
    <circle cx="980" cy="60" r="1.6"/><circle cx="1090" cy="120" r="1.2"/><circle cx="220" cy="320" r="1.4"/>
    <circle cx="700" cy="350" r="1.2"/><circle cx="900" cy="330" r="1.6"/><circle cx="60" cy="220" r="1.2"/>
  </g>
  <g fill="#f5f0e8" opacity="0.35">
    <circle cx="420" cy="40" r="1"/><circle cx="800" cy="100" r="1"/><circle cx="160" cy="160" r="1"/><circle cx="1040" cy="280" r="1"/>
  </g>

  <!-- 仙 印璽 -->
  <g transform="translate(190,210)" filter="url(#glow)">
    <circle r="92" fill="none" stroke="#c9952a" stroke-width="2.5"/>
    <circle r="78" fill="none" stroke="#c9952a" stroke-width="1" opacity="0.45"/>
    <text y="34" text-anchor="middle" font-size="96" font-weight="900" fill="url(#gold)">仙</text>
  </g>

  <!-- 標題 -->
  <text x="430" y="208" font-size="120" font-weight="900" fill="url(#gold)" filter="url(#glow)" letter-spacing="10">凌霄錄</text>
  <text x="434" y="258" font-size="24" fill="#3d9b8a" letter-spacing="14">轉生修仙 · 文字遊戲</text>
  <text x="434" y="296" font-size="17" fill="rgba(245,240,232,0.55)" letter-spacing="6">Líng Xiāo Lù · 時間 × 地點沙盒 · SugarCube 2</text>

  <!-- 四角色 motif -->
  <g text-anchor="middle" font-weight="900" opacity="0.92">
    <g transform="translate(470,360)"><circle r="26" fill="none" stroke="#9fcfe0" stroke-width="1.5" opacity="0.6"/><text y="9" font-size="26" fill="#9fcfe0">劍</text></g>
    <g transform="translate(540,360)"><circle r="26" fill="none" stroke="#f0b94a" stroke-width="1.5" opacity="0.6"/><text y="9" font-size="26" fill="#f0b94a">狐</text></g>
    <g transform="translate(610,360)"><circle r="26" fill="none" stroke="#8fdbe8" stroke-width="1.5" opacity="0.6"/><text y="9" font-size="26" fill="#8fdbe8">雪</text></g>
    <g transform="translate(680,360)"><circle r="26" fill="none" stroke="#bcaee6" stroke-width="1.5" opacity="0.6"/><text y="9" font-size="26" fill="#bcaee6">離</text></g>
  </g>
</svg>
